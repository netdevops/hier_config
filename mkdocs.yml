site_name: Hierarchical Configuration
site_url: https://hier-config.readthedocs.io/
repo_url: https://github.com/netdevops/hier_config
theme:
  name: readthedocs

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - User Guide:
      - Installation: user/install.md
      - Getting Started: user/getting-started.md
      - Migrating from v3: user/migrating-from-v3.md
      - Loading Configurations: user/loading-configs.md
      - Remediation Workflows: user/remediation-workflows.md
      - Working with Tags: user/tags.md
      - Predicting Future Configs: user/future-config.md
      - Unified Diffs: user/unified-diff.md
      - Remediation Reporting: user/remediation-reporting.md
      - Config Views: user/config-views.md
      - Set-Style Platforms: user/set-style-platforms.md
  - Administrator Guide:
      - Supported Platforms: admin/platforms.md
      - Customizing Driver Rules: admin/customizing-rules.md
      - Custom Drivers and Registration: admin/custom-drivers.md
      - Loading Rules from Files: admin/rules-from-files.md
  - Developer Guide:
      - Architecture: dev/architecture.md
      - Driver Rule Reference: dev/rule-reference.md
      - Creating a Platform Driver: dev/creating-drivers.md
      - Contributing: dev/contributing.md
      - API Reference: dev/api-reference.md
  - Glossary: glossary.md
